global:
  scrape_interval: 5s  #Every 5 seconds, ask the gateway for metrics.

scrape_configs:
  - job_name: "gateway"

    static_configs:
      - targets:
          - host.docker.internal:8000  #Which application should I monitor?
  - job_name: user-service-1
    static_configs:
      - targets:
          - host.docker.internal:8002

  - job_name: user-service-2
    static_configs:
      - targets:
          - host.docker.internal:8003        